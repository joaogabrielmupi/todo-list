{% extends 'base.html' %}

{% block content %}
<div x-data="{ modalOpen: false }" @close-modal.window="modalOpen = false">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-slate-700">Minhas Tarefas</h1>
        <button
                hx-get="{% url 'create-task' %}"
                hx-target="#modal-body"
                @click="modalOpen = true"
                class="bg-[#627BFF] hover:bg-[#4d66e6] text-white px-5 py-2.5 rounded-lg font-semibold shadow-sm transition-all flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
            </svg>
            Nova Tarefa
        </button>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-300 mb-6 flex flex-wrap gap-4">
        <div class="flex-1 min-w-[200px]">
            <input type="text" name="q"
                placeholder="Buscar tarefa..."
                class="w-full border border-slate-200 p-2 rounded-lg focus:ring-2 focus:ring-[#627BFF] outline-none"
                hx-get="{% url 'index' %}"
                hx-trigger="keyup changed delay:500ms"
                hx-target="#task-container"
                hx-include="[name='status'], [name='date']">
        </div>
        <select name="status"
                class="bg-[#627BFF] hover:bg-[#4d66e6] text-white px-3 py-2.5 rounded-lg font-semibold shadow-sm transition-all flex items-center gap-1"
                hx-get="{% url 'index' %}"
                hx-target="#task-container"
                hx-include="[name='q'], [name='date']">
            <option value="">Todos os Status</option>
            <option value="completed">Concluídas</option>
            <option value="pending">Pendentes</option>
        </select>
    </div>

    <div id="task-container">
        {% include 'partials/task_list.html' %}
    </div>

    <div x-show="modalOpen" x-cloak
         class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4">
        <div @click.away="modalOpen = false"
             class="bg-white w-full max-w-lg rounded-2xl shadow-2xl border border-slate-200 overflow-hidden">
            <div id="modal-body" class="p-8"></div>
        </div>
    </div>
</div>
{% endblock %}
