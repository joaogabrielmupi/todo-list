<div class="flex justify-between items-center mb-6">
    <h2 class="text-xl font-bold text-white">{{ modal_title }}</h2>
    <button @click="modalOpen = false" class="text-slate-500 hover:text-white">&times;</button>
</div>

<form hx-post="{{ request.path }}"
      hx-target="{% if task %}#task-{{ task.id }}{% else %}#task-table-body{% endif %}"
      hx-swap="{% if task %}outerHTML{% else %}afterbegin{% endif %}"
      @htmx:after-request="if($event.detail.successful) { modalOpen = false }"
      class="space-y-4">

    {% csrf_token %}
    <div>
        <label class="block text-sm font-medium text-slate-400 mb-1">Título da Tarefa</label>
        <input type="text" name="title" value="{{ task.title|default:'' }}" required
               class="w-full bg-white border border-slate-700 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
    </div>

    <div>
        <label class="block text-sm font-medium text-slate-400 mb-1">Descrição (Opcional)</label>
        <textarea name="description" rows="3"
                  class="w-full bg-white border border-slate-700 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">{{ task.description|default:'' }}</textarea>
    </div>

    <div class="flex justify-end gap-3 pt-4">
        <button type="button" @click="modalOpen = false"
                class="px-4 py-2 text-slate-400 hover:text-white transition">
            Cancelar
        </button>
        <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold transition">
            {% if task %}Salvar Alterações{% else %}Criar Tarefa{% endif %}
        </button>
    </div>
</form>

{% if not task %}
<script>
    document.getElementById('empty-row')?.remove();
</script>
{% endif %}
