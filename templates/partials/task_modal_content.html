<div class="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
    <h2 class="text-xl font-bold text-slate-800">{{ modal_title }}</h2>
    <button @click="modalOpen = false" class="text-slate-400 hover:text-slate-600 transition-colors text-2xl">&times;</button>
</div>

<form hx-post="{{ request.path }}"
      hx-target="{% if task %}#task-{{ task.id }}{% else %}#task-table-body{% endif %}"
      hx-swap="{% if task %}outerHTML{% else %}afterbegin{% endif %}"
      @htmx:after-request="if($event.detail.successful) { modalOpen = false }"
      x-data="{ title: '{{ task.title|escapejs|default:'' }}' }"
      class="space-y-5">

    {% csrf_token %}

    <div>
        <div class="flex justify-between items-end mb-1">
            <label class="block text-sm font-semibold text-slate-700">Título da Tarefa</label>
            <span class="text-[10px] font-medium" :class="title.length > 90 ? 'text-red-500' : 'text-slate-400'">
                <span x-text="title.length"></span>/100
            </span>
        </div>
        <input
                type="text"
                name="title"
                x-model="title"
                maxlength="200"
                required
                placeholder="Ex: Finalizar projeto Herpetosys"
                class="w-full bg-white border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-[#627BFF] focus:border-[#627BFF] outline-none transition-all placeholder:text-slate-300">

        {% if form.title.errors %}
            <p class="text-red-500 text-xs mt-1.5 font-medium flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                </svg>
                {{ form.title.errors.0 }}
            </p>
        {% endif %}
    </div>

    <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Descrição (Opcional)</label>
        <textarea name="description" rows="3"
                  placeholder="Detalhes sobre a tarefa..."
                  class="w-full bg-white border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-[#627BFF] focus:border-[#627BFF] outline-none transition-all placeholder:text-slate-300">{{ task.description|default:'' }}</textarea>
    </div>

    <div class="flex justify-end gap-3 pt-4">
        <button type="button" @click="modalOpen = false"
                class="px-5 py-2.5 text-slate-500 hover:text-slate-700 font-semibold transition">
            Cancelar
        </button>
        <button type="submit"
                class="bg-[#627BFF] hover:bg-[#4d66e6] text-white px-8 py-2.5 rounded-xl font-bold shadow-lg shadow-blue-100 transition-all transform hover:-translate-y-0.5 active:scale-95">
            {% if task %}Salvar Alterações{% else %}Criar Tarefa{% endif %}
        </button>
    </div>
</form>

{% if not task %}
<script>
    document.getElementById('empty-row')?.remove();
</script>
{% endif %}
