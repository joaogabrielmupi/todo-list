<tr id="task-{{ task.id }}" class="hover:bg-slate-50/80 transition-colors group border-b border-slate-100 last:border-0">
    <td class="p-4 w-16 text-center">
        <input type="checkbox"
               id="task-check-{{ task.id }}"
               name="task_status_{{ task.id }}"
               autocomplete="off"
               title="Marcar como concluída"
               {% if task.is_completed %}checked{% endif %}
               hx-post="{% url 'update-task' task.id %}"
               hx-target="#task-{{ task.id }}"
               hx-swap="outerHTML"
               class="w-5 h-5 rounded border-slate-300 text-[#627BFF] focus:ring-[#627BFF] cursor-pointer transition-all">
    </td>

    <td class="p-4 max-w-0 w-full">
        <div class="flex flex-col">
            <span class="text-sm font-semibold truncate cursor-pointer hover:text-[#627BFF] transition-colors {% if task.is_completed %}line-through text-slate-400{% else %}text-slate-700{% endif %}"
                  hx-get="{% url 'task-detail' task.id %}"
                  hx-target="#modal-body"
                  @click="modalOpen = true"
                  title="{{ task.title | capfirst }}"> {{ task.title | capfirst }}
            </span>

            {% if task.description %}
                <span class="text-xs text-slate-400 mt-0.5 line-clamp-1">
                    {{ task.description }}
                </span>
            {% endif %}
        </div>
    </td>

    <td class="p-4 text-right whitespace-nowrap w-32">
        <div class="flex justify-end gap-4 opacity-0 group-hover:opacity-100 transition-all duration-200">
            <button hx-get="{% url 'edit-task' task.id %}"
                    hx-target="#modal-body"
                    @click="modalOpen = true"
                    class="text-[#627BFF] hover:text-[#4d66e6] text-xs font-bold uppercase tracking-wider transition-colors">
                Editar
            </button>
            <button hx-delete="{% url 'delete-task' task.id %}"
                    hx-confirm="Deseja excluir '{{ task.title }}'?"
                    hx-target="#task-{{ task.id }}"
                    hx-swap="delete"
                    class="text-red-400 hover:text-red-600 text-xs font-bold uppercase tracking-tight transition-colors">
                Excluir
            </button>
        </div>
    </td>
</tr>
