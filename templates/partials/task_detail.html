<div class="flex justify-between items-start mb-6 pb-4 border-b border-slate-100">
    <div>
        <h2 class="text-2xl font-bold text-slate-800">{{ task.title }}</h2>
        <p class="text-xs text-slate-400 mt-1">
            Criada em {{ task.created_at|date:"d/m/Y às H:i" }}
        </p>
    </div>
    <button @click="modalOpen = false" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
</div>

<div class="space-y-6">
    <div>
        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Descrição</label>
        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 text-slate-700 leading-relaxed">
            {% if task.description %}
                {{ task.description|linebreaks }}
            {% else %}
                <span class="text-slate-400 italic">Nenhuma descrição fornecida.</span>
            {% endif %}
        </div>
    </div>

    <div class="flex items-center gap-2">
        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider">Status:</label>
        {% if task.is_completed %}
            <span class="px-2 py-1 bg-green-100 text-green-700 text-[10px] font-bold rounded-md uppercase">Concluída</span>
        {% else %}
            <span class="px-2 py-1 bg-amber-100 text-amber-700 text-[10px] font-bold rounded-md uppercase">Pendente</span>
        {% endif %}
    </div>

    <div class="flex justify-end pt-4">
        <button @click="modalOpen = false"
                class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-6 py-2.5 rounded-xl font-bold transition-all">
            Fechar
        </button>
    </div>
</div>
