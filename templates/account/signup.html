{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white p-10 rounded-3xl shadow-2xl border border-slate-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-slate-800">Criar Conta</h2>
            <p class="text-slate-500 mt-2">Organize suas tarefas.</p>
        </div>

        <form method="POST" action="{% url 'account_signup' %}" class="space-y-4">
            {% csrf_token %}
            <div class="space-y-4">
                {% for field in form %}
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">{{ field.label }}</label>
                        <input type="{{ field.field.widget.input_type }}" 
                               name="{{ field.name }}" 
                               class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-[#627BFF] outline-none transition-all">
                        {% if field.errors %}
                            <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                        {% endif %}
                    </div>
                {% endfor %}
            </div>
            <button type="submit" class="w-full bg-[#627BFF] text-white py-4 rounded-xl font-bold text-lg shadow-lg mt-4 hover:bg-[#4d66e6] transition-all">
                Cadastrar
            </button>
        </form>
    </div>
</div>
{% endblock %}
