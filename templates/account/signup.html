{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white p-10 rounded-3xl shadow-2xl border border-slate-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-slate-800">Criar Conta</h2>
            <p class="text-slate-500 mt-2">Organize suas tarefas.</p>
        </div>

        <form method="POST"
              action="{% url 'account_signup' %}"
              x-data="{ loading : false }"
              @submit="loading = true"
              class="space-y-4">
            {% csrf_token %}
            <div class="space-y-4">
                {% for field in form %}
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">{{ field.label }}</label>
                        <input type="{{ field.field.widget.input_type }}" 
                               name="{{ field.name }}" 
                               class="w-full border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-[#627BFF] outline-none transition-all">
                        {% if field.errors %}
                            <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                        {% endif %}
                    </div>
                {% endfor %}
            </div>
            <button type="submit"
                    :disabled="loading"
                    class="w-full bg-[#627BFF] text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-blue-200 hover:bg-[#4d66e6] transition-all transform hover:-translate-y-0.5">
                <div class="flex items-center justify-center">
                    <svg x-show="loading" x-cloak class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </div>
                <span x-text="loading ? 'Cadastrando...' : 'Cadastrar'"></span>
            </button>
        </form>
    </div>
</div>
{% endblock %}
