{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskSystem | Onboarding Mupi</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="{% static 'js/htmx.min.js' %}"></script>
    <script defer src="{% static 'js/alpine.min.js' %}"></script>

    <style> [x-cloak] { display: none !important; } </style>
</head>
<body class="bg-white text-slate-900 font-sans" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <div class="fixed inset-0 flex items-center justify-center -z-10 opacity-[0.03] pointer-events-none">
        <img src="{% static 'images/logo.png' %}" class="w-[500px] md:w-[800px] object-contain">
    </div>

    <nav class="bg-[#627BFF] shadow-lg mb-8">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="{% static 'images/logo.png' %}"
                     class="h-10 w-10 bg-white rounded-full p-1 shadow-sm">
                <span class="text-white text-2xl font-bold tracking-tight">TaskSystem</span>
            </div>
            <div class="text-blue-100 text-sm font-medium">Painel de controle</div>
        </div>
    </nav>

    <div class="container mx-auto max-w-5xl px-6">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
